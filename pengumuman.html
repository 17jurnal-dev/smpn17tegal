<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Pengumuman Sekolah</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

.header {
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container {
  padding:15px;
  max-width:500px;
  margin:auto;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  animation: fadeIn 0.4s ease;
}

.card h3 {
  margin:0 0 5px;
  font-size:16px;
}

.card p {
  margin:5px 0;
  font-size:14px;
}

.card small {
  opacity:0.7;
}

.btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-size:15px;
  background:#ffffff;
  color:#333;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #333;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success {
  background: #16a34a;
}

.toast.error {
  background: #dc2626;
}
  
.loading {
  text-align:center;
  opacity:0.7;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>
<div id="toast" class="toast"></div>
<div class="header">📢 Pengumuman Sekolah</div>

<div class="container">

<div id="list" class="loading">Memuat data...</div>

<button class="btn" onclick="loadData()">🔄 Refresh</button>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxz6COoQhPUSD_O1JGNByBR5VMeN1dwW6zCgQaLASCwFCbiSJNOtZapafMVAa7VrT1r/exec?mode=pengumuman";

function formatTanggal(tgl){
  const d = new Date(tgl);
  return d.toLocaleDateString("id-ID", {
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  });
}

function isToday(tgl){
  const d = new Date(tgl);
  const today = new Date();
  return d.toDateString() === today.toDateString();
}

function loadData(){
  document.getElementById("list").innerHTML = "Memuat data...";

  fetch(URL)
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.reverse().forEach(item => {

      const todayBadge = isToday(item.tanggal)
        ? "<span style='color:yellow;'>🔥 Hari ini</span><br>"
        : "";

      html += `
        <div class="card">
          ${todayBadge}
          <h3>${item.judul}</h3>
          <p>${item.isi}</p>
          <small>📅 ${formatTanggal(item.tanggal)}</small>
        </div>
      `;
    });

    document.getElementById("list").innerHTML = html;

  })
  .catch(() => {
    document.getElementById("list").innerHTML = "❌ Gagal memuat data";
  });
}

// AUTO LOAD
loadData();

// AUTO REFRESH tiap 30 detik
setInterval(loadData, 30000);
function showToast(message, type = "success") {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.className = `toast show ${type}`;

  setTimeout(() => {
    toast.className = "toast";
  }, 3000);
}
</script>

</body>
</html>
