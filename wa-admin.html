<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Broadcast Admin</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  background: #0f172a;
  color: white;
}

select, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
}

.preview {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  white-space: pre-line;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #16a34a;
  padding: 10px 20px;
  border-radius: 8px;
  display: none;
}
</style>
</head>

<body>

<h2>📲 WA Broadcast</h2>

<select id="kelas">
  <option value="SEMUA">Semua Kelas</option>
  <option value="7A">7A</option>
  <option value="8B">8B</option>
</select>

<button onclick="preview()">👁️ Preview</button>
<button onclick="kirim()">🚀 Kirim WA</button>

<div class="preview" id="previewBox"></div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxz6COoQhPUSD_O1JGNByBR5VMeN1dwW6zCgQaLASCwFCbiSJNOtZapafMVAa7VrT1r/exec";
const KEY = "JITU2026";

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",3000);
}

function preview(){
  const kelas = document.getElementById("kelas").value;

  fetch(`${GAS_URL}?action=previewWA&kelas=${kelas}&key=${KEY}`)
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("previewBox").innerText =
      `Total Target: ${d.total}

Contoh Pesan:
${d.contohPesan}`;
  });
}

function kirim(){
  if(!confirm("Yakin kirim WA?")) return;

  const kelas = document.getElementById("kelas").value;

  fetch(`${GAS_URL}?action=kirimWA&kelas=${kelas}&key=${KEY}`)
  .then(r=>r.text())
  .then(res=>{
    showToast(res);
  });
}
</script>

</body>
</html>
