<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" async></script>
  
<title>SMPN 17 Tegal</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

/* PAGE */
.page {display:none;padding:15px;max-width:500px;margin:auto;}
.active {display:block;}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

/* IFRAME */
iframe {width:100%;height:80vh;border:none;border-radius:10px;}

/* CHAT */
.chat-header{text-align:center;padding:10px;font-weight:bold;}
.chat-box{height:60vh;overflow-y:auto;padding:10px;}

/* BUBBLE */
.bubble {
  max-width:75%;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  font-size:14px;
}

/* USER */
.me{background:#16a34a;margin-left:auto;text-align:right;}

/* BOT */
.bot{background:#374151;margin-right:auto;}

/* INPUT */
.chat-input {
  display:flex;
  gap:5px;
  padding:10px;
  position:fixed;
  bottom:60px;
  width:100%;
  max-width:500px;
}

.chat-input input {
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
}

.chat-input button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
}

/* NAVBAR */
.navbar {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(0,0,0,0.7);
}

.navbar button {
  flex:1;
  padding:10px;
  border:none;
  background:none;
  color:white;
  font-size:11px;
  overflow-x: auto;
}

.navbar button.active {
  background:rgba(255,255,255,0.2);
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:white;
  padding:10px 20px;
  border-radius:8px;
  display:none;
}

</style>
</head>

<body>

<!-- PENGUMUMAN -->
<div id="pengumuman" class="page active">
  <h3>📢 Pengumuman</h3>
  <div id="listPengumuman">Loading...</div>
</div>

<!-- KEGIATAN -->
<div id="kegiatan" class="page">
  <h3>📅 Kegiatan</h3>
  <div id="listKegiatan">Loading...</div>
</div>

<!-- ABSENSI -->
<div id="absensi" class="page">
  <h3>🎓 Absensi Siswa</h3>
  <div class="card">
    <input id="namaAbsen" placeholder="Nama"style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;">
    <input id="kelasAbsen" placeholder="Kelas"style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;">
    <button onclick="absen()"style="width:100%;padding:10px;border:none;border-radius:10px;">✅ Hadir</button>
  </div>
</div>

<!-- CHAT WHATSAPP STYLE -->
<div id="chat" class="page">
<div class="chat-header">💬 Chat Admin</div>
<div id="chatBox" class="chat-box"></div>

<div class="chat-input">
<input id="namaUser" placeholder="Nama">
<input id="noUser" placeholder="62xxx">
<input id="pesanUser" placeholder="Pesan">
<button onclick="kirimPesan()">➤</button>
</div>
</div>

<!-- JAMU LINU -->
<div id="jamu" class="page">
  <iframe src="https://script.google.com/macros/s/AKfycbz3gd_lIfhGX-PwmdoWnT5WF8icANrigvzQme6ed8CSOuSzqrPxYlkK0dxTP40jtdbOlA/exec"></iframe>
</div>

<!-- CBT -->
<div id="cbt" class="page">
  <iframe src="https://script.google.com/macros/s/AKfycbzY7A1CKQ4E7te_sNIMwRWOGQAV_SdBrQ7gbxrRqk1mIUmLsC5MPNrQRd2IF32buN8N/exec"></iframe>
</div>

<!-- WA ADMIN -->
<div id="wa" class="page">
  <h3>📲 WA Broadcast</h3>

  <select id="kelasWA"style="width:100%;padding:10px;border-radius:10px;margin-bottom:10px;">
    <option value="SEMUA">Semua Kelas</option>
    <option value="7A">7A</option>
    <option value="8B">8B</option>
  </select>

  <button onclick="previewWA()"style="width:100%;padding:10px;border:none;border-radius:10px;margin-bottom:10px;">👁️ Preview</button>
  <button onclick="kirimWAAdmin()"style="width:100%;padding:10px;border:none;border-radius:10px;margin-bottom:10px;">🚀 Kirim</button>

  <div id="previewBox" class="card">Preview akan muncul di sini...</div>

  <div class="card">
    <b>📊 Statistik WA</b><br><br>
    Total: <span id="statTotal">0</span><br>
    ✅ Sukses: <span id="statSukses">0</span><br>
    ❌ Gagal: <span id="statGagal">0</span>
  </div>
  <div class="card">
    <b>📥 Inbox Siswa</b>
    <div id="inboxList">Loading...</div>
  </div>
  <canvas id="chartWA" height="200"></canvas>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <button onclick="showPage('pengumuman', this)" class="active">📢<br>Info</button>
  <button onclick="showPage('kegiatan', this)">📅<br>Kegiatan</button>
  <button onclick="showPage('absensi', this)">🎓<br>Absen</button>
  <button onclick="showPage('chat', this)">💬<br>Chat</button>
  <button onclick="showPage('jamu', this)">📚<br>Jamu</button>
  <button onclick="showPage('cbt', this)">📝<br>CBT</button>
  <button onclick="loginAdmin()">📲<br>WA</button>
</div>
  
<div id="toast" style="
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
color:white;
padding:10px 20px;
border-radius:8px;
display:none;
"></div>
  
<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxz6COoQhPUSD_O1JGNByBR5VMeN1dwW6zCgQaLASCwFCbiSJNOtZapafMVAa7VrT1r/exec";

/* =========================
📱 NAVIGATION
========================= */
function showPage(id, btn){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".navbar button").forEach(b => b.classList.remove("active"));
  if(btn) btn.classList.add("active");
  if(id === "wa"){
    loadStatistik();
    loadInbox();
}

/* =========================
📊 LOAD DATA
========================= */
function loadData(mode, elementId){
  fetch(GAS_URL + "?mode=" + mode)
  .then(res => {
    if(!res.ok) throw new Error("Network error");
    return res.json();
  .then(data => {
    let html = "";
    data.reverse().forEach(item => {
      html += `
        <div class="card">
          <b>${item.judul}</b><br>
          ${item.isi}<br>
          <small>${new Date(item.tanggal).toLocaleDateString("id-ID")}</small>
        </div>
      `;
    });
    document.getElementById(elementId).innerHTML = html;
  });
  .catch(()=>{
    document.getElementById(elementId).innerHTML = "❌ Gagal load data";
  });
}

loadData("pengumuman", "listPengumuman");
loadData("kegiatan", "listKegiatan");

let lastCount = 0;

function checkNewData(){
  fetch(GAS_URL + "?mode=pengumuman")
  .then(res => res.json())
  .then(data => {

    if(lastCount !== 0 && data.length > lastCount){
      alert("🔔 Pengumuman baru!");
    }

    lastCount = data.length;
  });
}

// cek tiap 15 detik
setInterval(checkNewData, 15000);
}

// ============================
// 👁️ PREVIEW WA
// ============================
function previewWA(){
  const kelas = document.getElementById("kelasWA").value;

  fetch(GAS_URL + "?action=previewWA&kelas=" + kelas + "&key=JITU2026")
  .then(res => res.json())
  .then(data => {

    if(data.error){
      showToast(data.error);
      return;
    }

    document.getElementById("previewBox").innerText =
      `Total Target: ${data.total}

Contoh Pesan:
${data.contohPesan}`;
  })
  .catch(() => {
    showToast("❌ Gagal preview");
  });
}

// ============================
// 🚀 KIRIM WA
// ============================
function kirimWAAdmin(){
  const kelas = document.getElementById("kelas").value;

  if(!confirm("Yakin kirim WA ke " + kelas + "?")) return;

  fetch(GAS_URL + "?action=kirimWA&kelas=" + kelas + "&key=JITU2026")
  .then(res => res.text())
  .then(res => {
    showToast(res);
  })
  .catch(() => {
    showToast("❌ Gagal kirim WA");
  });
}

/* =========================
🍞 TOAST
========================= */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",3000);
}

/* =========================
🔔 NOTIF
========================= */
let lastJudul = "";

function cekNotif(){
  fetch(GAS_URL + "?action=notif")
  .then(res => res.json())
  .then(d => {
    if(!d.judul) return;

    if(lastJudul && d.judul !== lastJudul){
      showToast("🔔 Pengumuman baru: " + d.judul);
    }

    lastJudul = d.judul;
  })
  .catch(()=>{});
}
// cek tiap 10 detik
setInterval(cekNotif, 10000);

/* =========================
🔐 ADMIN LOGIN
========================= */
const ADMIN_PIN = "170717"; // ganti bebas
let isAdmin = false;

function loginAdmin(){
  const pin = prompt("Masukkan PIN Admin:");

  if(pin === ADMIN_PIN){
    isAdmin = true;
    showToast("✅ Mode Admin aktif");
    showPage('wa', document.querySelectorAll('.navbar button')[4]);
  } else {
    showToast("❌ PIN salah");
  }
}

/* =========================
📊 STATISTIK
========================= */
let chart;

function renderChart(data){
  const ctx = document.getElementById('chartWA');

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Sukses', 'Gagal'],
      datasets: [{
        data: [data.sukses, data.gagal]
      }]
    }
  });
}

function loadStatistik(){
  fetch(GAS_URL + "?action=statistikWA")
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("statTotal").innerText = d.total;
    document.getElementById("statSukses").innerText = d.sukses;
    document.getElementById("statGagal").innerText = d.gagal;

    renderChart(d);
  })
  .catch(()=>{});
}

/* =========================
📥 INBOX
========================= */
function loadInbox(){
  fetch(GAS_URL + "?action=inbox")
  .then(r=>r.json())
  .then(d=>{
    let html="";
    d.forEach(x=>{
      html+=`<div class="card">
        <b>${x.nama}</b><br>
        ${x.pesan}
      </div>`;
    });
    document.getElementById("inboxList").innerHTML = html;
  })
  .catch(()=>{});
}

/* =========================
🎓 ABSENSI
========================= */
function absen(){
  const nama = document.getElementById("namaAbsen").value;
  const kelas = document.getElementById("kelasAbsen").value;

  fetch(GAS_URL+`?action=absen&nama=${nama}&kelas=${kelas}`)
  .then(()=>showToast("✅ Absen berhasil"))
  .catch(()=>showToast("❌ Gagal absen"));
}

window.OneSignal = window.OneSignal || [];
OneSignal.push(function() {
  OneSignal.init({
    appId: "ISI_APP_ID_KAMU"
  });
});

/* =========================
💬 CHAT
========================= */
function kirimPesan(){
  const nama = document.getElementById("namaUser").value;
  const no = document.getElementById("noUser").value;
  const pesan = document.getElementById("pesanUser").value;

  if(!nama || !no || !pesan){
    showToast("❌ Lengkapi dulu","error");
    return;
  }

  // tampilkan pesan user
  addBubble(pesan, "me");
  document.getElementById("pesanUser").value = "";

  fetch(GAS_URL + `?action=kirimPesan&nama=${encodeURIComponent(nama)}&no=${no}&pesan=${encodeURIComponent(pesan)}`)
  .then(res=>res.json())
  .then(res=>{
    addBubble(res.reply || "OK", "bot");
  })
  .catch(()=>{
    addBubble("❌ Gagal kirim", "bot");
  });
}

function addBubble(text, type){
  const box = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = `bubble ${type}`;
  div.innerText = text;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
/* ENTER CHAT */
document.getElementById("pesanUser")
.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    kirimPesan();
  }
});

// ============================
// 📱 REGISTER SERVICE WORKER
// ============================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log("SW aktif"))
    .catch(err => console.log("SW gagal", err));
}

</script>

</body>
</html>
