<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">

<title>SMPN 17 Tegal</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

/* PAGE */
.page {
  display:none;
  padding:15px;
  max-width:500px;
  margin:auto;
}

.active {
  display:block;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

/* IFRAME */
iframe {
  width:100%;
  height:80vh;
  border:none;
  border-radius:10px;
}

/* NAVBAR */
.navbar {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(0,0,0,0.7);
}

.navbar button {
  flex:1;
  padding:10px;
  border:none;
  background:none;
  color:white;
  font-size:12px;
}

.navbar button.active {
  background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<!-- PENGUMUMAN -->
<div id="pengumuman" class="page active">
  <h3>📢 Pengumuman</h3>
  <div id="listPengumuman">Loading...</div>
</div>

<!-- KEGIATAN -->
<div id="kegiatan" class="page">
  <h3>📅 Kegiatan</h3>
  <div id="listKegiatan">Loading...</div>
</div>

<!-- JAMU LINU -->
<div id="jamu" class="page">
  <iframe src="https://script.google.com/macros/s/AKfycbz3gd_lIfhGX-PwmdoWnT5WF8icANrigvzQme6ed8CSOuSzqrPxYlkK0dxTP40jtdbOlA/exec"></iframe>
</div>

<!-- CBT -->
<div id="cbt" class="page">
  <iframe src="https://script.google.com/macros/s/AKfycbzY7A1CKQ4E7te_sNIMwRWOGQAV_SdBrQ7gbxrRqk1mIUmLsC5MPNrQRd2IF32buN8N/exec"></iframe>
</div>

<!-- WA ADMIN -->
<div id="wa" class="page">
  <h3>📲 WA Broadcast</h3>

  <select id="kelas" style="width:100%;padding:10px;border-radius:10px;margin-bottom:10px;">
    <option value="SEMUA">Semua Kelas</option>
    <option value="7A">7A</option>
    <option value="8B">8B</option>
  </select>

  <button onclick="previewWA()" style="width:100%;padding:10px;border:none;border-radius:10px;margin-bottom:10px;">
    👁️ Preview
  </button>

  <button onclick="kirimWAAdmin()" style="width:100%;padding:10px;border:none;border-radius:10px;margin-bottom:10px;">
    🚀 Kirim WA
  </button>

  <div id="previewBox" class="card">Preview akan muncul di sini...</div>

  <div class="card">
    <b>📊 Statistik WA</b><br><br>
    Total: <span id="statTotal">0</span><br>
    ✅ Sukses: <span id="statSukses">0</span><br>
    ❌ Gagal: <span id="statGagal">0</span>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <button onclick="showPage('pengumuman', this)" class="active">📢<br>Info</button>
  <button onclick="showPage('kegiatan', this)">📅<br>Kegiatan</button>
  <button onclick="showPage('jamu', this)">📚<br>Jamu</button>
  <button onclick="showPage('cbt', this)">📝<br>CBT</button>
  <button onclick="loginAdmin()">📲<br>WA</button>
</div>
  
<div id="toast" style="
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
color:white;
padding:10px 20px;
border-radius:8px;
display:none;
"></div>
  
<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxz6COoQhPUSD_O1JGNByBR5VMeN1dwW6zCgQaLASCwFCbiSJNOtZapafMVAa7VrT1r/exec";

/* NAVIGATION */
function showPage(id, btn){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".navbar button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

/* LOAD DATA */
function loadData(mode, elementId){
  fetch(GAS_URL + "?mode=" + mode)
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.reverse().forEach(item => {
      html += `
        <div class="card">
          <b>${item.judul}</b><br>
          ${item.isi}<br>
          <small>${new Date(item.tanggal).toLocaleDateString("id-ID")}</small>
        </div>
      `;
    });
    document.getElementById(elementId).innerHTML = html;
  });
}

loadData("pengumuman", "listPengumuman");
loadData("kegiatan", "listKegiatan");

let lastCount = 0;

function checkNewData(){
  fetch(GAS_URL + "?mode=pengumuman")
  .then(res => res.json())
  .then(data => {

    if(lastCount !== 0 && data.length > lastCount){
      alert("🔔 Pengumuman baru!");
    }

    lastCount = data.length;
  });
}

// cek tiap 15 detik
setInterval(checkNewData, 15000);

function kirimWA(){

  if(!confirm("Yakin kirim WA ke semua siswa?")) return;

  fetch(GAS_URL + "?action=kirimWA&key=JITU2026")
  .then(res => res.text())
  .then(res => {
    showToast("✅ Pesan berhasil diproses!");
  })
  .catch(() => {
    showToast("❌ Gagal kirim WA", "error");
  });

}
// ============================
// 👁️ PREVIEW WA
// ============================
function previewWA(){
  const kelas = document.getElementById("kelas").value;

  fetch(GAS_URL + "?action=previewWA&kelas=" + kelas + "&key=JITU2026")
  .then(res => res.json())
  .then(data => {

    if(data.error){
      showToast(data.error);
      return;
    }

    document.getElementById("previewBox").innerText =
      `Total Target: ${data.total}

Contoh Pesan:
${data.contohPesan}`;
  })
  .catch(() => {
    showToast("❌ Gagal preview");
  });
}

// ============================
// 🚀 KIRIM WA
// ============================
function kirimWAAdmin(){

  const kelas = document.getElementById("kelas").value;

  if(!confirm("Yakin kirim WA ke " + kelas + "?")) return;

  fetch(GAS_URL + "?action=kirimWA&kelas=" + kelas + "&key=JITU2026")
  .then(res => res.text())
  .then(res => {
    showToast(res);
  })
  .catch(() => {
    showToast("❌ Gagal kirim WA");
  });
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",3000);
}

function loadStatistik(){
  fetch(GAS_URL + "?action=statistikWA")
  .then(res => res.json())
  .then(d => {
    document.getElementById("statTotal").innerText = d.total;
    document.getElementById("statSukses").innerText = d.sukses;
    document.getElementById("statGagal").innerText = d.gagal;
  });
  if(id === "wa") loadStatistik();
}

let lastJudul = "";

function cekNotif(){

  fetch(GAS_URL + "?action=notif")
  .then(res => res.json())
  .then(d => {

    if(!d.judul) return;

    if(lastJudul && d.judul !== lastJudul){
      showToast("🔔 Pengumuman baru: " + d.judul);
    }

    lastJudul = d.judul;

  });

}

// cek tiap 10 detik
setInterval(cekNotif, 10000);

const ADMIN_PIN = "1707"; // ganti bebas
let isAdmin = false;

function loginAdmin(){
  const pin = prompt("Masukkan PIN Admin:");

  if(pin === ADMIN_PIN){
    isAdmin = true;
    showToast("✅ Mode Admin aktif");
    showPage('wa', document.querySelectorAll('.navbar button')[4]);
  } else {
    showToast("❌ PIN salah");
  }
}

// ============================
// 📱 REGISTER SERVICE WORKER
// ============================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log("SW aktif"))
    .catch(err => console.log("SW gagal", err));
}

</script>

</body>
</html>
